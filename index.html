<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>✨Mia Dyachuk✨</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #ffffff, #ffe4f1, #f3f4f6);
  overflow: hidden;
}

/* soft glow background elements */
body::before {
  content: "";
  position: absolute;
  width: 600px;
  height: 600px;
  background: pink;
  filter: blur(120px);
  opacity: 0.25;
  top: -200px;
  left: -200px;
}

body::after {
  content: "";
  position: absolute;
  width: 500px;
  height: 500px;
  background: #ff4fa3;
  filter: blur(140px);
  opacity: 0.2;
  bottom: -200px;
  right: -200px;
}

.card {
  width: 380px;
  text-align: center;
  padding: 45px;
  border-radius: 32px;
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(25px);
  box-shadow: 0 25px 80px rgba(0,0,0,0.15);
  border: 1px solid rgba(0,0,0,0.05);
  position: relative;
  z-index: 2;
}

.avatar {
  width: 125px;
  height: 125px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid #ff4fa3;
  box-shadow: 0 0 30px rgba(255,79,163,0.35);
  margin-bottom: 15px;
}

h1 {
  margin: 10px 0 5px;
  font-size: 28px;
  letter-spacing: 0.5px;
}

.sub {
  font-size: 13px;
  color: #666;
  margin-bottom: 18px;
}

/* ICON ROW (4 IMAGE ICONS) */
.icon-row {
  display: flex;
  justify-content: center;
  gap: 14px;
  margin-bottom: 22px;
}

.icon {
  width: 46px;
  height: 46px;
  border-radius: 14px;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  background: white;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
  transition: 0.25s;
}

.icon img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.icon:hover {
  transform: scale(1.12);
  box-shadow: 0 15px 40px rgba(255,79,163,0.25);
}

/* BUTTONS */
.link {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 12px 0;
  padding: 15px 16px;
  border-radius: 18px;
  text-decoration: none;
  color: #111;
  background: white;
  border: 1px solid rgba(0,0,0,0.08);
  box-shadow: 0 12px 30px rgba(0,0,0,0.06);
  transition: 0.25s;
  font-weight: 500;
}

.link:hover {
  transform: translateY(-3px);
  box-shadow: 0 18px 50px rgba(255,79,163,0.2);
  border-color: #ff4fa3;
}

.small {
  font-size: 12px;
  color: #888;
}
</style>
</head>

<body>

<div class="card">

  <img src="photo.jpg" class="avatar" />

  <h1>Mia Dyachuk</h1>
  <p class="sub">exclusive content • personal moments</p>

  <!-- 4 ICONS (YOU INSERT IMAGE LINKS) -->
  <div class="icon-row">

    <a class="icon" href="YOUR_INSTAGRAM_LINK">
      <img src="INSTAGRAM_ICON_IMAGE_URL" />
    </a>

    <a class="icon" href="YOUR_TIKTOK_LINK">
      <img src="Telegram_logo.svg.png" />
    </a>

    <a class="icon" href="YOUR_INSTAGRAM_LINK">
      <img src="INSTAGRAM_ICON_IMAGE_URL" />
    </a>

    <a class="icon" href="YOUR_TIKTOK_LINK">
      <img src="Telegram_logo.svg.png" />
    </a>

  </div>

  <a class="link" href="YOUR_INSTAGRAM_LINK">
    <span>Instagram</span>
    <span class="small">my insta🤍</span>
  </a>

  <a class="link" href="YOUR_TIKTOK_LINK">
    <span>Telegram</span>
    <span class="small">My private group💗</span>
  </a>

</div>

</body>
</html>
