<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Mia Dyachuk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            color: white;
            position: relative;
        }

        .background {
            position: absolute;
            inset: 0;
            background-image: url('IMG_0365.jpg');
            background-size: cover;
            background-position: center top;
            filter: blur(0px);
            transition: filter 1.2s ease;
            z-index: -2;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to bottom,
                rgba(0, 0, 0, 0.15) 30%,
                rgba(0, 0, 0, 0.75) 65%,
                rgba(0, 0, 0, 0.95) 100%
            );
            z-index: -1;
        }

        .content {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4.5rem;
            font-weight: 700;
            letter-spacing: -2px;
            margin-bottom: 0.5rem;
            text-shadow: 0 4px 30px rgba(0,0,0,0.6);
        }

        .subtitle {
            font-size: 1.25rem;
            opacity: 0.9;
            margin-bottom: 3rem;
            letter-spacing: 1px;
        }

        .btn {
            width: 100%;
            max-width: 420px;
            padding: 18px 28px;
            margin: 12px 0;
            border-radius: 9999px;
            font-size: 1.25rem;
            font-weight: 600;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            position: relative;
            overflow: hidden;
        }

        .btn-fanvue {
            background: linear-gradient(90deg, #ff4fa3, #c026d3);
            color: white;
            box-shadow: 0 10px 30px -5px rgba(192, 38, 211, 0.5);
        }

        .btn-fanvue:hover {
            transform: translateY(-4px) scale(1.03);
            box-shadow: 0 20px 40px -5px rgba(192, 38, 211, 0.6);
        }

        .btn-telegram {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
        }

        .btn-telegram:hover {
            background: rgba(255,255,255,0.25);
            transform: translateY(-4px);
        }

        /* Modal */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: #1a1a1a;
            padding: 2.5rem;
            border-radius: 24px;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
            animation: modalPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes modalPop {
            from { transform: scale(0.6); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- Background -->
    <div class="background" id="bg"></div>
