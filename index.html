<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mia Dyachuk</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ffffff, #ffe4f1, #f3f4f6);
  color: #111;
}

.card {
  width: 370px;
  text-align: center;
  padding: 40px;
  border-radius: 30px;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(20px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  border: 1px solid rgba(0,0,0,0.05);
}

.avatar {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid #ff4fa3;
  box-shadow: 0 0 25px rgba(255,79,163,0.25);
  margin-bottom: 15px;
}

h1 {
  margin: 10px 0 5px;
  font-size: 26px;
}

.sub {
  font-size: 13px;
  color: #666;
  margin-bottom: 20px;
}

/* ICON ROW */
.icons {
  display: flex;
  justify-content: center;
  gap: 18px;
  margin: 10px 0 20px;
}

.icon {
  width: 42px;
  height: 42px;
  border-radius: 12px;
  display: flex;
  justify-content: center;
  align-items: center;
  text-decoration: none;
  font-size: 20px;
  background: white;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
  transition: 0.25s;
}

.icon:hover {
  transform: scale(1.1);
}

/* BUTTONS */
.link {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 12px 0;
  padding: 14px 16px;
  border-radius: 18px;
  text-decoration: none;
  color: #111;
  background: white;
  border: 1px solid rgba(0,0,0,0.08);
  box-shadow: 0 10px 25px rgba(0,0,0,0.05);
  transition: 0.25s;
  font-weight: 500;
}

.link:hover {
  transform: translateY(-2px);
  box-shadow: 0 15px 35px rgba(255,79,163,0.2);
  border-color: #ff4fa3;
}

.small {
  font-size: 12px;
  color: #888;
}
</style>
</head>

<body>

<div class="card">

  <img src="IMG_0365.jpg" class="avatar" />

  <h1>Mia Dyachuk</h1>

  <p class="sub">exclusive content • personal moments</p>

  <!-- ICONS BETWEEN TEXT AND BUTTONS -->
  <div class="icons">
    <a class="icon" href="https://www.instagram.com/iamdyachukk?igsh=MWV0ajB3d3lwa3BxMA==" target="_blank">📸</a>
    <a class="icon" href="https://t.me/+uY-FtHCuM0hlNTIx" target="_blank">💬</a>
  </div>

  <a class="link" href="https://www.instagram.com/iamdyachukk?igsh=MWV0ajB3d3lwa3BxMA==" target="_blank">
    <span>📸 Instagram</span>
    <span class="small">my insta🤍</span>
  </a>

  <a class="link" href="https://t.me/+uY-FtHCuM0hlNTIx" target="_blank">
    <span>💬 Telegram</span>
    <span class="small">My private group💗</span>
  </a>

</div>

</body>
</html>
