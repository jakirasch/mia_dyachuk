<title>Mia Dyachuk</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #111827, #0b0f1a);
  color: white;
}

.card {
  width: 360px;
  text-align: center;
  padding: 40px;
  border-radius: 28px;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(18px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  border: 1px solid rgba(255,255,255,0.08);
}

.avatar {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid rgba(255, 105, 180, 0.6);
  box-shadow: 0 0 25px rgba(255, 105, 180, 0.3);
  margin-bottom: 15px;
}

h1 {
  margin: 10px 0 5px;
  font-size: 26px;
  letter-spacing: 0.5px;
}

.sub {
  font-size: 13px;
  opacity: 0.6;
  margin-bottom: 20px;
  color: #f9a8d4;
}

.link {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 12px 0;
  padding: 14px 16px;
  border-radius: 16px;
  text-decoration: none;
  color: white;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.1);
  transition: 0.25s;
}

.link:hover {
  background: rgba(255,105,180,0.15);
  transform: translateY(-2px);
  box-shadow: 0 10px 30px rgba(255,105,180,0.15);
}

.small {
  font-size: 12px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="card">
