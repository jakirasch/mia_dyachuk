<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mia Dyachuk</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  padding: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background-color: #0b090a;
  overflow-x: hidden;
  color: #ffffff;
}

/* Эффект дорогого фонового изображения с плавным размытием и растворением вниз */
.bg-image {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: url('IMG_0365.jpg') no-repeat center top;
  background-size: cover;
  z-index: 1;
}

/* Сложная маска: сверху фото четкое, к середине размывается и уходит в глубокий темный цвет */
.bg-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 2;
  background: linear-gradient(to bottom, 
    rgba(11, 9, 10, 0) 0%, 
    rgba(11, 9, 10, 0.2) 20%, 
    rgba(11, 9, 10, 0.6) 40%, 
    rgba(11, 9, 10, 0.95) 70%, 
    #0b090a 100%);
}

/* Динамическое размытие нижней части экрана */
.bg-blur-bottom {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 65%;
  z-index: 3;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  mask-image: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 50%);
  -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 50%);
}

/* Контентная премиум-карта */
.card {
  width: 100%;
  max-width: 420px;
  text-align: center;
  padding: 40px 24px;
  position: relative;
  z-index: 10;
  margin: 20px;
  margin-top: 30vh;
}

h1 {
  margin: 0 0 6px 0;
  font-size: 34px;
  font-weight: 700;
  letter-spacing: -0.5px;
  color: #ffffff;
  text-shadow: 0 4px 12px rgba(0,0,0,0.5);
}

.sub {
  font-size: 11px; /* Уменьшили размер для идеального вмещения в одну строку */
  color: rgba(255, 255, 255, 0.6);
  margin-bottom: 40px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  font-weight: 600;
  text-shadow: 0 2px 4px rgba(0,0,0,0.3);
  white-space: nowrap; /* Запрет переноса строки */
}

/* КНОПКИ */
.link {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  padding: 18px 24px;
  border-radius: 20px;
  text-decoration: none;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  font-size: 17px;
}

/* ГЛАВНАЯ КНОПКА: Сверх-акцент на Fanvue (Броская, более плотная, светящаяся) */
.link-fanvue {
  color: #ffffff;
  background: rgba(255, 255, 255, 0.12);
  border: 1px solid rgba(255, 255, 255, 0.25);
  box-shadow: 0 4px 25px rgba(255, 79, 163, 0.15);
  font-weight: 700;
}

.link-fanvue:hover {
  transform: translateY(-4px) scale(1.02);
  background: rgba(255, 79, 163, 0.25);
  border-color: rgba(255, 79, 163, 0.8);
  box-shadow: 0 15px 35px rgba(255, 79, 163, 0.4);
}

/* ВТОРОСТЕПЕННАЯ КНОПКА: Telegram убран на второй план (Более прозрачный, спокойный) */
.link-telegram {
  color: rgba(255, 255, 255, 0.7);
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid rgba(255, 255, 255, 0.06);
  font-weight: 500;
}

.link-telegram:hover {
  transform: translateY(-2px);
  background: rgba(255, 255, 255, 0.07);
  border-color: rgba(0, 136, 204, 0.4);
  color: #ffffff;
  box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
}

.small {
  font-size: 13px;
  color: rgba(255, 255, 255, 0.4);
  font-weight: 400;
  transition: color 0.3s;
}

.link-fanvue .small {
  color: rgba(255, 255, 255, 0.6);
  font-weight: 500;
}

.link:hover .small {
  color: rgba(255, 255, 255, 0.9);
}

/* МОДАЛЬНОЕ ОКНО ВЕРИФИКАЦИИ (ПОЛНОСТЬЮ НА АНГЛИЙСКОМ, БЕЗ КНОПКИ НЕТ) */
.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(5, 5, 5, 0.85);
  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);
  z-index: 100;
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s ease;
  padding: 20px;
}

.modal-overlay.active {
  opacity: 1;
  pointer-events: auto;
}

.modal-content {
  background: rgba(20, 20, 20, 0.85);
  border: 1px solid rgba(255, 255, 255, 0.08);
  padding: 45px 30px;
  border-radius: 28px;
  max-width: 380px;
  width: 100%;
  text-align: center;
  box-shadow: 0 30px 70px rgba(0,0,0,0.7);
  transform: scale(0.92);
  transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

.modal-overlay.active .modal-content {
  transform: scale(1);
}

.modal-content h2 {
  margin: 0 0 14px 0;
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.5px;
}

.modal-content p {
  font-size: 15px;
  color: rgba(255, 255, 255, 0.65);
  line-height: 1.5;
  margin-bottom: 35px;
}

.modal-buttons {
  display: flex;
  justify-content: center;
}

.modal-btn {
  width: 100%;
  padding: 18px;
  border-radius: 16px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s;
  border: none;
}

.btn-confirm {
  background: #ffffff;
  color: #000000;
}

.btn-confirm:hover {
  background: #ff4fa3;
  color: #ffffff;
  box-shadow: 0 10px 25px rgba(255, 79, 163, 0.4);
  transform: translateY(-2px);
}
</style>
</head>

<body>

<!-- Задний премиальный фон -->
<div class="bg-image"></div>
<div class="bg-overlay"></div>
<div class="bg-blur-bottom"></div>

<!-- Основная карта с контентом -->
<div class="card">

  <h1>Mia Dyachuk</h1>
  <p class="sub">exclusive content • personal moments</p>

  <!-- Приоритетная кнопка Fanvue (My Page) -->
  <a class="link link-fanvue" href="https://www.fanvue.com/dyachuk_mia" id="fanvueLink">
    <span>My Page</span>
    <span class="small">my little secret 🤍</span>
  </a>

  <!-- Второстепенная кнопка Telegram -->
  <a class="link link-telegram" href="https://t.me/+uY-FtHCuM0hlNTIx">
    <span>Telegram</span>
    <span class="small">my private group 💗</span>
  </a>

</div>

<!-- Всплывающее окно верификации 18+ (Только подтверждение) -->
<div class="modal-overlay" id="ageModal">
  <div class="modal-content">
    <h2>Are you 18 or older?</h2>
    <p>This profile contains exclusive adult content. By clicking the button below, you confirm that you are at least 18 years of age.</p>
    <div class="modal-buttons">
      <button class="modal-btn btn-confirm" id="btnYes">Yes, I am 18+</button>
    </div>
  </div>
</div>

<script>
  const fanvueLink = document.getElementById('fanvueLink');
  const ageModal = document.getElementById('ageModal');
  const btnYes = document.getElementById('btnYes');
  
  const targetUrl = fanvueLink.getAttribute('href');

  // Открытие окна при клике на Fanvue
  fanvueLink.addEventListener('click', function(event) {
    event.preventDefault(); 
    ageModal.classList.add('active');
  });

  // Редирект на Fanvue
  btnYes.addEventListener('click', function() {
    window.location.href = targetUrl;
  });
</script>

</body>
</html>
